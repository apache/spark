# This is a placeholder. PyPy support was dropped since Spark 4.2, so master
# does not run this build. The file exists here only so that the README build
# status badge, which resolves a workflow by its path on the default branch,
# renders for the branches that still run it (e.g. branch-4.1). The actual
# build is defined in the same file on those branches.

name: "Build / Python-only (PyPy 3.10)"

on:
  workflow_dispatch:

jobs:
  noop:
    if: github.repository == 'apache/spark'
    runs-on: ubuntu-latest
    steps:
      - name: No-op
        run: echo "PyPy 3.10 is not built on this branch. See branches that still support it (e.g. branch-4.1)."

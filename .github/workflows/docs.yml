name: Documentation

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read

concurrency:
  group: docs-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      LC_ALL: C.UTF-8
      LANG: C.UTF-8
    steps:
      - name: Checkout pull request merge commit
        uses: actions/checkout@v6

      - name: Install Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 17

      - name: Cache SBT and Maven
        uses: actions/cache@v5
        with:
          path: |
            build/apache-maven-*
            build/*.jar
            ~/.sbt
          key: build-${{ runner.os }}-${{ hashFiles('**/pom.xml', 'project/build.properties', 'build/mvn', 'build/sbt', 'build/sbt-launch-lib.bash', 'build/spark-build-info') }}
          restore-keys: |
            build-${{ runner.os }}-

      - name: Restore Coursier local repository
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/coursier
          key: coursier-${{ runner.os }}-${{ hashFiles('**/pom.xml', '**/plugins.sbt') }}
          restore-keys: |
            coursier-${{ runner.os }}-

      - name: Cache Maven local repository
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: docs-maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            docs-maven-${{ runner.os }}-

      - name: Set up Ruby
        uses: ruby/setup-ruby@4dc28cf14d77b0afa6832d9765ac422dbf0dfedd
        with:
          ruby-version: '3.4'
          working-directory: docs
          bundler: 2.4.22
          bundler-cache: true

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: dev/requirements.txt

      - name: Install Python requirements
        run: python3 -m pip install --upgrade -r dev/requirements.txt

      - name: Register javadoc problem matcher
        run: echo "::add-matcher::.github/problem-matchers/javadoc.json"

      - name: Build docs
        run: |
          cd docs
          SKIP_RDOC=1 bundle exec jekyll build

      - name: Remove javadoc problem matcher
        if: always()
        run: echo "::remove-matcher owner=javadoc-doclint::"

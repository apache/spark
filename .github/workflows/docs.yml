name: Documentation

on:
  push:
    branches:
      - '**'
      - '!branch-*.*'

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      LC_ALL: C.UTF-8
      LANG: C.UTF-8
    steps:
      - name: Checkout Spark repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check branch freshness
        if: github.repository != 'apache/spark'
        run: |
          git fetch https://github.com/apache/spark.git master --quiet
          echo "APACHE_SPARK_REF=$(git rev-parse FETCH_HEAD)" >> $GITHUB_ENV
          commits_behind=$(git rev-list --count HEAD..FETCH_HEAD)
          echo "Branch is ${commits_behind} commits behind upstream master."
          # Spark has averaged around 10 commits per day for the past few years.
          if [ "$commits_behind" -gt 30 ]; then
            echo "::error::Branch is ${commits_behind} commits behind upstream master. Please update your branch."
            exit 1
          fi

      - name: Demonstrate is-changed.py compatibility
        if: github.repository != 'apache/spark'
        run: |
          echo "APACHE_SPARK_REF=$APACHE_SPARK_REF"
          docs_changed=$(./dev/is-changed.py -m docs)
          echo "docs module changed: $docs_changed"

      - name: Install Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 17

      - name: Cache SBT and Maven
        uses: actions/cache@v5
        with:
          path: |
            build/apache-maven-*
            build/*.jar
            ~/.sbt
          key: build-${{ runner.os }}-${{ hashFiles('**/pom.xml', 'project/build.properties', 'build/mvn', 'build/sbt', 'build/sbt-launch-lib.bash', 'build/spark-build-info') }}
          restore-keys: |
            build-${{ runner.os }}-

      - name: Restore Coursier local repository
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/coursier
          key: coursier-${{ runner.os }}-${{ hashFiles('**/pom.xml', '**/plugins.sbt') }}
          restore-keys: |
            coursier-${{ runner.os }}-

      - name: Cache Maven local repository
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: docs-maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            docs-maven-${{ runner.os }}-

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          working-directory: docs
          bundler: 2.4.22
          bundler-cache: true

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: dev/requirements.txt

      - name: Install Python requirements
        run: |
          python3 -m pip install --upgrade -r dev/requirements.txt

      - name: Register javadoc problem matcher
        run: echo "::add-matcher::.github/problem-matchers/javadoc.json"

      - name: Build docs
        run: |
          set -o pipefail
          cd docs
          SKIP_RDOC=1 bundle exec jekyll build 2>&1 | tee "$RUNNER_TEMP/docs-build.log"

      - name: Remove javadoc problem matcher
        if: always()
        run: echo "::remove-matcher owner=javadoc-doclint::"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: docs-build-log
          path: ${{ runner.temp }}/docs-build.log
          retention-days: 3

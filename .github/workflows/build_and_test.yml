    - name: Sync the current branch with the latest in Apache Spark
      if: github.repository != 'apache/spark'
      run: |
        echo "APACHE_SPARK_REF=$(git rev-parse HEAD)" >> $GITHUB_ENV
        git fetch https://github.com/$GITHUB_REPOSITORY.git ${GITHUB_REF#refs/heads/}
        git -c user.name='Apache Spark Test Account' -c user.email='sparktestacc@gmail.com' merge --no-commit --progress --squash FETCH_HEAD
        git -c user.name='Apache Spark Test Account' -c user.email='sparktestacc@gmail.com' commit -m "Merged commit" --allow-empty
    - name: Cache SBT and Maven
      uses: actions/cache@v5
      with:
        path: |
          build/apache-maven-*
          build/*.jar
          ~/.sbt
        key: build-${{ runner.os }}-${{ hashFiles('**/pom.xml', 'project/build.properties', 'build/mvn', 'build/sbt', 'build/sbt-launch-lib.bash', 'build/spark-build-info') }}
        restore-keys: |
          build-${{ runner.os }}-
    - name: Restore Coursier local repository
      uses: actions/cache/restore@v5
      with:
        path: ~/.cache/coursier
        key: coursier-${{ runner.os }}-${{ hashFiles('**/pom.xml', '**/plugins.sbt') }}
        restore-keys: |
          coursier-${{ runner.os }}-
    - name: Install Java ${{ inputs.java }}
      uses: actions/setup-java@v5
      with:
        distribution: zulu
        java-version: ${{ inputs.java }}
    - name: Download precompiled artifact
      id: download-precompiled
      if: needs.precompile.result == 'success'
      continue-on-error: true
      uses: actions/download-artifact@v8
      with:
        name: spark-compile-${{ inputs.branch }}-${{ github.run_id }}
    - name: Extract precompiled artifact
      id: extract-precompiled
      if: steps.download-precompiled.outcome == 'success'
      continue-on-error: true
      run: |
        zstd -dc compile-artifact.tar.zst | tar -xf -
        rm compile-artifact.tar.zst
    - name: Run tests
      env: ${{ fromJSON(inputs.envs) }}
      run: |
        if [ "${{ steps.extract-precompiled.outcome }}" = "success" ]; then
          export SKIP_SCALA_BUILD=true
          echo "Reusing precompiled artifact, skipping local SBT build."
        fi
        ./dev/run-tests --parallelism 1 --modules docker-integration-tests --included-tags org.apache.spark.tags.DockerTest
    - name: Upload test results to report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: test-results-docker-integration--${{ inputs.java }}-${{ inputs.hadoop }}-hive2.3
        path: |
          **/target/test-reports/*.xml
          **/target/surefire-reports/*.xml
    - name: Test Summary
      if: always()
      uses: test-summary/action@37b508cfee6d4d080eedd00b5bb240a6a784a6a5 # v2.6
      with:
        paths: |
          **/target/test-reports/*.xml
          **/target/surefire-reports/*.xml
    - name: Upload unit tests log files
      if: ${{ !success() }}
      uses: actions/upload-artifact@v7
      with:
        name: unit-tests-log-docker-integration--${{ inputs.java }}-${{ inputs.hadoop }}-hive2.3
        path: "**/target/unit-tests.log"

  k8s-integration-tests:
    needs: [precondition, precompile]
    if: (!cancelled()) && fromJson(needs.precondition.outputs.required).k8s-integration-tests == 'true'
    name: Run Spark on Kubernetes Integration test
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout Spark repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          repository: apache/spark
          ref: ${{ needs.precondition.outputs.head_sha }}
      - name: Sync the current branch with the latest in Apache Spark
        if: github.repository != 'apache/spark'
        run: |
          echo "APACHE_SPARK_REF=$(git rev-parse HEAD)" >> $GITHUB_ENV
          git fetch https://github.com/$GITHUB_REPOSITORY.git ${GITHUB_REF#refs/heads/}
          git -c user.name='Apache Spark Test Account' -c user.email='sparktestacc@gmail.com' merge --no-commit --progress --squash FETCH_HEAD
          git -c user.name='Apache Spark Test Account' -c user.email='sparktestacc@gmail.com' commit -m "Merged commit" --allow-empty
      - name: Cache SBT and Maven
        uses: actions/cache@v5
        with:
          path: |
            build/apache-maven-*
            build/*.jar
            ~/.sbt
          key: build-${{ runner.os }}-${{ hashFiles('**/pom.xml', 'project/build.properties', 'build/mvn', 'build/sbt', 'build/sbt-launch-lib.bash', 'build/spark-build-info') }}
          restore-keys: |
            build-${{ runner.os }}-
      - name: Restore Coursier local repository
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/coursier
          key: coursier-${{ runner.os }}-${{ hashFiles('**/pom.xml', '**/plugins.sbt') }}
          restore-keys: |
            coursier-${{ runner.os }}-
      - name: Free up disk space
        run: |
          if [ -f ./dev/free_disk_space ]; then
            ./dev/free_disk_space
          fi
      - name: Install Java ${{ inputs.java }}
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: ${{ inputs.java }}
      - name: Download precompiled artifact
        id: download-precompiled
        if: needs.precompile.result == 'success'
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: spark-compile-${{ inputs.branch }}-${{ github.run_id }}
      - name: Extract precompiled artifact
        id: extract-precompiled
        if: steps.download-precompiled.outcome == 'success'
        continue-on-error: true
        run: |
          zstd -dc compile-artifact.tar.zst | tar -xf -
          rm compile-artifact.tar.zst
      - name: Install R
        run: |
          sudo apt update
          sudo apt-get install r-base
      - name: Start Minikube
        uses: medyagh/setup-minikube@e9e035a86bbc3caea26a450bd4dbf9d0c453682e # v0.0.21
        with:
          kubernetes-version: "1.36.0"
          # GitHub Actions limit 4C/16G, limit to 2C/6G for better resource statistic
          # https://docs.github.com/en/actions/reference/runners/github-hosted-runners#standard-github-hosted-runners-for-public-repositories
          cpus: 2
          memory: 6144m
      - name: Print K8S pods and nodes info
        run: |
          kubectl get pods -A
          kubectl describe node
      - name: Run Spark on K8S integration test
        run: |
          # Prepare PV test
          PVC_TMP_DIR=$(mktemp -d)
          export PVC_TESTS_HOST_PATH=$PVC_TMP_DIR
          export PVC_TESTS_VM_PATH=$PVC_TMP_DIR
          minikube mount ${PVC_TESTS_HOST_PATH}:${PVC_TESTS_VM_PATH} --gid=0 --uid=185 &
          kubectl create clusterrolebinding serviceaccounts-cluster-admin --clusterrole=cluster-admin --group=system:serviceaccounts || true
          kubectl apply -f https://raw.githubusercontent.com/volcano-sh/volcano/v1.14.2/installer/volcano-development.yaml || true
          eval $(minikube docker-env)
          build/sbt -Phadoop-3 -Psparkr -Pkubernetes -Pvolcano -Pkubernetes-integration-tests -Dspark.kubernetes.test.volcanoMaxConcurrencyJobNum=1 -Dtest.exclude.tags=local "kubernetes-integration-tests/test"
      - name: Upload Spark on K8S integration tests log files
        if: ${{ !success() }}
        uses: actions/upload-artifact@v7
        with:
          name: spark-on-kubernetes-it-log
          path: "**/target/integration-tests.log"

  ui:
    needs: [precondition]
    if: fromJson(needs.precondition.outputs.required).ui == 'true'
    name: Run Spark UI tests
    # `ubuntu-slim` is lighter than `ubuntu-latest`.
    # Please see https://docs.github.com/en/actions/how-tos/write-workflows/choose-where-workflows-run/choose-the-runner-for-a-job#standard-github-hosted-runners-for-public-repositories
    runs-on: ubuntu-slim
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.13.0
          cache: 'npm'
          cache-dependency-path: ui-test/package-lock.json
      - run: |
          cd ui-test
          npm install --save-dev
          node --experimental-vm-modules node_modules/.bin/jest

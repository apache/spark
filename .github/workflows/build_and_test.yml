name: Build and test

on:
  workflow_call:
    inputs:
      java:
        required: false
        type: string
        default: 17
      branch:
        description: Branch to run the build against
        required: false
        type: string
        # Caller workflows (build_main, build_branch*) pass branch explicitly. Python toolchain used in
        # lint/docs/Python CodeGen (buf job): branch-3.5 / branch-4.0 use 3.9; branch-4.1 uses 3.11
        # (black codegen); branch-4.2 / branch-4.x and master use 3.12 (ruff codegen).
        default: master
      hadoop:
        description: Hadoop version to run with. HADOOP_PROFILE environment variable should accept it.
        required: false
        type: string
        default: hadoop3
      envs:
        description: Additional environment variables to set when running the tests. Should be in JSON format.
        required: false
        type: string
        default: '{"PYSPARK_IMAGE_TO_TEST": "python-312", "PYTHON_TO_TEST": "python3.12"}'
      jobs:
        description: >-
          Jobs to run, and should be in JSON format. The values should be matched with the job's key defined
          in this file, e.g., build. See precondition job below.
        required: false
        type: string
        default: ''
    secrets:
      codecov_token:
        description: The upload token of codecov.
        required: false
concurrency:
  group: build-test-${{ github.workflow }}-${{ github.repository == 'apache/spark' && github.run_id || github.ref }}
  cancel-in-progress: true
jobs:
  precondition:
    name: Check changes
    # `ubuntu-slim` is lighter than `ubuntu-latest`.
    # Please see https://docs.github.com/en/actions/how-tos/write-workflows/choose-where-workflows-run/choose-the-runner-for-a-job#standard-github-hosted-runners-for-public-repositories
    runs-on: ubuntu-slim
    env:
      GITHUB_PREV_SHA: ${{ github.event.before }}
    outputs:
      required: ${{ steps.set-outputs.outputs.required }}
      # Pinned so every downstream job checks out the same snapshot, even if `master` advances mid-run.
      head_sha: ${{ steps.resolve-sha.outputs.head_sha }}
      image_url: ${{ steps.infra-image-outputs.outputs.image_url }}
      image_docs_url: ${{ steps.infra-image-docs-outputs.outputs.image_docs_url }}
      image_docs_url_link: ${{ steps.infra-image-link.outputs.image_docs_url_link }}
      image_lint_url: ${{ steps.infra-image-lint-outputs.outputs.image_lint_url }}
      image_lint_url_link: ${{ steps.infra-image-link.outputs.image_lint_url_link }}
      image_sparkr_url: ${{ steps.infra-image-sparkr-outputs.outputs.image_sparkr_url }}
      image_sparkr_url_link: ${{ steps.infra-image-link.outputs.image_sparkr_url_link }}
      image_pyspark_url: ${{ steps.infra-image-pyspark-outputs.outputs.image_pyspark_url }}
      image_pyspark_url_link: ${{ steps.infra-image-link.outputs.image_pyspark_url_link }}
    steps:
    - name: Checkout Spark repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        repository: apache/spark
        ref: ${{ inputs.branch }}
    - name: Resolve apache/spark HEAD SHA
      id: resolve-sha
      run: echo "head_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
    - name: Sync the current branch with the latest in Apache Spark
      if: github.repository != 'apache/spark'
      run: |
        echo "APACHE_SPARK_REF=$(git rev-parse HEAD)" >> $GITHUB_ENV
        git fetch https://github.com/$GITHUB_REPOSITORY.git ${GITHUB_REF#refs/heads/}
        git -c user.name='Apache Spark Test Account' -c user.email='sparktestacc@gmail.com' merge --no-commit --progress --squash FETCH_HEAD
        git -c user.name='Apache Spark Test Account' -c user.email='sparktestacc@gmail.com' commit -m "Merged commit" --allow-empty
    - name: Check all modules
      id: set-outputs
      run: |
        if [ -z "${{ inputs.jobs }}" ]; then
          pyspark_modules=`cd dev && python -c "import sparktestsupport.modules as m; print(','.join(m.name for m in m.all_modules if m.name.startswith('pyspark') and not m.name.startswith('pyspark-pandas') and not m.name == 'pyspark-install'))"`
          pyspark_pandas_modules=`cd dev && python -c "import sparktestsupport.modules as m; print(','.join(m.name for m in m.all_modules if m.name.startswith('pyspark-pandas')))"`
          pyspark=`./dev/is-changed.py -m $pyspark_modules`
          pandas=`./dev/is-changed.py -m $pyspark_pandas_modules`
          pyspark_install=`./dev/is-changed.py -m pyspark-install`
          pyspark_connect_old_client="$pyspark"
          if [[ "${{ github.repository }}" != 'apache/spark' ]]; then
            yarn=`./dev/is-changed.py -m yarn`
            kubernetes=`./dev/is-changed.py -m kubernetes`
            sparkr=`./dev/is-changed.py -m sparkr`
            tpcds=`./dev/is-changed.py -m sql`
            docker=`./dev/is-changed.py -m docker-integration-tests`
            # Skip PySpark, SparkR, TPC-DS when only static UI resources (JS/CSS/HTML) changed.
            # These tests are unaffected by UI static resource modifications.
            changed_files=$(git diff --name-only "$APACHE_SPARK_REF" HEAD 2>/dev/null)
            if [ -n "$changed_files" ]; then
              static_only=true
              for f in $changed_files; do
                case "$f" in
                  */resources/*/static/*) ;;
                  *) static_only=false; break ;;
                esac
              done
            else
              static_only=false
            fi
            if [ "$static_only" = "true" ]; then
              pyspark=false
              pandas=false
              sparkr=false
              tpcds=false
              docker=false
            fi
            buf=true
            ui=true
            docs=true
            java25=true
            scala3=true
          else
            pyspark_install=false
            pyspark_connect_old_client=false
            pandas=false
            yarn=false
            kubernetes=false
            sparkr=false
            tpcds=false
            docker=false
            buf=false
            ui=false
            docs=false
            java25=false
            scala3=false
          fi
          build=`./dev/is-changed.py -m "core,unsafe,kvstore,avro,utils,utils-java,network-common,network-shuffle,repl,launcher,examples,sketch,variant,api,catalyst,hive-thriftserver,mllib-local,mllib,graphx,streaming,sql-kafka-0-10,streaming-kafka-0-10,streaming-kinesis-asl,kubernetes,hadoop-cloud,spark-ganglia-lgpl,profiler,protobuf,yarn,connect,sql,hive,pipelines"`
          build_core_utils=`./dev/is-changed.py -m "core,unsafe,kvstore,utils,utils-java,network-common,network-shuffle,sketch,variant,launcher"`
          precondition="
            {
              \"build\": \"$build\",
              \"build-core-utils\": \"$build_core_utils\",
              \"pyspark\": \"$pyspark\",
              \"pyspark-pandas\": \"$pandas\",
              \"pyspark-install\": \"$pyspark_install\",
              \"pyspark-connect-old-client\": \"$pyspark_connect_old_client\",
              \"sparkr\": \"$sparkr\",
              \"tpcds-1g\": \"$tpcds\",
              \"docker-integration-tests\": \"$docker\",
              \"lint\" : \"true\",
              \"java25\" : \"$java25\",
              \"scala3\" : \"$scala3\",
              \"docs\" : \"$docs\",
              \"yarn\" : \"$yarn\",
              \"k8s-integration-tests\" : \"$kubernetes\",
              \"buf\" : \"$buf\",
              \"ui\" : \"$ui\",
            }"
          echo $precondition # For debugging
          # Remove `\n` to avoid "Invalid format" error
          precondition="${precondition//$'\n'/}"
          echo "required=$precondition" >> $GITHUB_OUTPUT
        else
          # This is usually set by scheduled jobs.
          precondition='${{ inputs.jobs }}'
          echo $precondition # For debugging
          precondition="${precondition//$'\n'/}"
          echo "required=$precondition" >> $GITHUB_OUTPUT
        fi
    - name: Check envs
      id: check-envs
      env: ${{ fromJSON(inputs.envs) }}
      run: |
        if [[ "${{ fromJson(steps.set-outputs.outputs.required).pyspark }}"  == 'true' || "${{ fromJson(steps.set-outputs.outputs.required).pyspark-pandas }}"  == 'true' ]]; then
          if [[ "${{ env.PYSPARK_IMAGE_TO_TEST }}" == "" ]]; then
            echo "PYSPARK_IMAGE_TO_TEST is required when pyspark is enabled."
            exit 1
          fi
          PYSPARK_IMAGE_PATH="dev/spark-test-image/${{ env.PYSPARK_IMAGE_TO_TEST }}/Dockerfile"
          if [ -f $PYSPARK_IMAGE_PATH ]; then
            echo "Dockerfile $PYSPARK_IMAGE_PATH exists."
          else
            echo "Dockerfile $PYSPARK_IMAGE_PATH does NOT exist."
            exit 1
          fi
          if [[ "${{ env.PYTHON_TO_TEST }}" == "" ]]; then
            echo "PYTHON_TO_TEST is required when pyspark is enabled."
            exit 1
          fi
        fi
    - name: Generate infra image URL
      id: infra-image-outputs
      run: |
        # Convert to lowercase to meet Docker repo name requirement
        REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
        IMG_NAME="apache-spark-ci-image:${{ inputs.branch }}-${{ github.run_id }}"
        IMG_URL="ghcr.io/$REPO_OWNER/$IMG_NAME"
        echo "image_url=$IMG_URL" >> $GITHUB_OUTPUT
    - name: Generate infra image URL (Documentation)
      id: infra-image-docs-outputs
      run: |
        # Convert to lowercase to meet Docker repo name requirement
        REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
        IMG_NAME="apache-spark-ci-image-docs:${{ inputs.branch }}-${{ github.run_id }}"
        IMG_URL="ghcr.io/$REPO_OWNER/$IMG_NAME"
        echo "image_docs_url=$IMG_URL" >> $GITHUB_OUTPUT
    - name: Generate infra image URL (Linter)
      id: infra-image-lint-outputs
      run: |
        # Convert to lowercase to meet Docker repo name requirement
        REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
        IMG_NAME="apache-spark-ci-image-lint:${{ inputs.branch }}-${{ github.run_id }}"
        IMG_URL="ghcr.io/$REPO_OWNER/$IMG_NAME"
        echo "image_lint_url=$IMG_URL" >> $GITHUB_OUTPUT
    - name: Generate infra image URL (SparkR)
      id: infra-image-sparkr-outputs
      run: |
        # Convert to lowercase to meet Docker repo name requirement
        REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
        IMG_NAME="apache-spark-ci-image-sparkr:${{ inputs.branch }}-${{ github.run_id }}"
        IMG_URL="ghcr.io/$REPO_OWNER/$IMG_NAME"
        echo "image_sparkr_url=$IMG_URL" >> $GITHUB_OUTPUT
    - name: Generate infra image URL (PySpark ${{ env.PYSPARK_IMAGE_TO_TEST }})
      id: infra-image-pyspark-outputs
      if: ${{ env.PYSPARK_IMAGE_TO_TEST }}
      env: ${{ fromJSON(inputs.envs) }}
      run: |
        # Convert to lowercase to meet Docker repo name requirement
        REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
        IMG_NAME="apache-spark-ci-image-pyspark-${{ env.PYSPARK_IMAGE_TO_TEST }}:${{ inputs.branch }}-${{ github.run_id }}"
        IMG_URL="ghcr.io/$REPO_OWNER/$IMG_NAME"
        echo "image_pyspark_url=$IMG_URL" >> $GITHUB_OUTPUT
    - name: Link the docker images
      id: infra-image-link
      env: ${{ fromJSON(inputs.envs) }}
      run: |
        # Set the image URL for job "docs"
        # Should delete the link and directly use image_docs_url after SPARK 3.x EOL
        echo "image_docs_url_link=${{ steps.infra-image-docs-outputs.outputs.image_docs_url }}" >> $GITHUB_OUTPUT
        echo "image_lint_url_link=${{ steps.infra-image-lint-outputs.outputs.image_lint_url }}" >> $GITHUB_OUTPUT
        echo "image_sparkr_url_link=${{ steps.infra-image-sparkr-outputs.outputs.image_sparkr_url }}" >> $GITHUB_OUTPUT
        echo "image_pyspark_url_link=${{ steps.infra-image-pyspark-outputs.outputs.image_pyspark_url }}" >> $GITHUB_OUTPUT

  # Build: build Spark and run the tests for specified modules.
  build:
    name: "Build modules: ${{ matrix.modules }} ${{ matrix.comment }}"
    needs: [precondition, precompile]
    if: (!cancelled()) && fromJson(needs.precondition.outputs.required).build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 150
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        java:
          - ${{ inputs.java }}
        hadoop:
          - ${{ inputs.hadoop }}
        hive:
          - hive2.3
        # Note that the modules below are from sparktestsupport/modules.py.
        modules:
          - >-
            core, unsafe, kvstore, utils, utils-java,
            network-common, network-shuffle, sketch, variant, launcher
          - >-
            api, catalyst, hive-thriftserver
          - >-
            mllib-local, mllib, graphx, profiler, pipelines, repl, examples
          - >-
            streaming, sql-kafka-0-10, streaming-kafka-0-10, streaming-kinesis-asl,
            kubernetes, hadoop-cloud, spark-ganglia-lgpl, protobuf, connect, avro
          - yarn
        # Here, we split Hive and SQL tests into some of slow ones and the rest of them.
        included-tags: [""]
        excluded-tags: [""]
        comment: [""]
        include:
          # Hive tests
          - modules: hive
            java: ${{ inputs.java }}
            hadoop: ${{ inputs.hadoop }}
            hive: hive2.3
            included-tags: org.apache.spark.tags.SlowHiveTest
            comment: "- slow tests"
          - modules: hive
            java: ${{ inputs.java }}
            hadoop: ${{ inputs.hadoop }}
            hive: hive2.3
            excluded-tags: org.apache.spark.tags.SlowHiveTest
            comment: "- other tests"
          # SQL tests
          - modules: sql
            java: ${{ inputs.java }}
            hadoop: ${{ inputs.hadoop }}
            hive: hive2.3
            included-tags: org.apache.spark.tags.ExtendedSQLTest
            comment: "- extended tests"
          - modules: sql
            java: ${{ inputs.java }}
            hadoop: ${{ inputs.hadoop }}
            hive: hive2.3
            included-tags: org.apache.spark.tags.SlowSQLTest
            comment: "- slow tests"
          - modules: sql
            java: ${{ inputs.java }}
            hadoop: ${{ inputs.hadoop }}
            hive: hive2.3
            excluded-tags: org.apache.spark.tags.ExtendedSQLTest,org.apache.spark.tags.SlowSQLTest
            comment: "- other tests"
        exclude:
          # Always run if yarn == 'true', even infra-image is skip (such as non-master job)
          # In practice, the build will run in individual PR, but not against the individual commit
          # in Apache Spark repository.
          - modules: ${{ fromJson(needs.precondition.outputs.required).yarn != 'true' && 'yarn' }}
          # Skip the core/utils group when a PR doesn't touch those modules (e.g. SQL-only or
          # PySpark-only changes). The precondition is opt-out: omitted means run (so periodic
          # full-build workflows that set only "build": "true" keep running this entry).
          - modules: ${{ fromJson(needs.precondition.outputs.required).build-core-utils == 'false' && 'core, unsafe, kvstore, utils, utils-java, network-common, network-shuffle, sketch, variant, launcher' }}
    env:
      MODULES_TO_TEST: ${{ matrix.modules }}
      EXCLUDED_TAGS: ${{ matrix.excluded-tags }}
      INCLUDED_TAGS: ${{ matrix.included-tags }}
      HADOOP_PROFILE: ${{ matrix.hadoop }}
      HIVE_PROFILE: ${{ matrix.hive }}
      GITHUB_PREV_SHA: ${{ github.event.before }}
      SPARK_LOCAL_IP: localhost
      SKIP_UNIDOC: true
      SKIP_MIMA: true
      SKIP_PACKAGING: true
    steps:
    - name: Checkout Spark repository
      uses: actions/checkout@v6
      # In order to fetch changed files
      with:
        fetch-depth: 0
        repository: apache/spark
        ref: ${{ needs.precondition.outputs.head_sha }}
    - name: Sync the current branch with the latest in Apache Spark
      if: github.repository != 'apache/spark'
      run: |
        echo "APACHE_SPARK_REF=$(git rev-parse HEAD)" >> $GITHUB_ENV
        git fetch https://github.com/$GITHUB_REPOSITORY.git ${GITHUB_REF#refs/heads/}
        git -c user.name='Apache Spark Test Account' -c user.email='sparktestacc@gmail.com' merge --no-commit --progress --squash FETCH_HEAD
        git -c user.name='Apache Spark Test Account' -c user.email='sparktestacc@gmail.com' commit -m "Merged commit" --allow-empty
    # Cache local repositories. Note that GitHub Actions cache has a 10G limit.
    - name: Cache SBT and Maven
      uses: actions/cache@v5
      with:
        path: |
          build/apache-maven-*
          build/*.jar
          ~/.sbt
        key: build-${{ runner.os }}-${{ hashFiles('**/pom.xml', 'project/build.properties', 'build/mvn', 'build/sbt', 'build/sbt-launch-lib.bash', 'build/spark-build-info') }}
        restore-keys: |
          build-${{ runner.os }}-
    - name: Restore Coursier local repository
      uses: actions/cache/restore@v5
      with:
        path: ~/.cache/coursier
        key: coursier-${{ runner.os }}-${{ matrix.java }}-${{ matrix.hadoop }}-${{ hashFiles('**/pom.xml', '**/plugins.sbt') }}
        restore-keys: |
          coursier-${{ runner.os }}-${{ matrix.java }}-${{ matrix.hadoop }}-
          coursier-${{ runner.os }}-
    - name: Free up disk space
      run: |
        if [ -f ./dev/free_disk_space ]; then
          ./dev/free_disk_space
        fi
    - name: Install Java ${{ matrix.java }}
      uses: actions/setup-java@v5
      with:
        distribution: zulu
        java-version: ${{ matrix.java }}
    - name: Install Python 3.12
      uses: actions/setup-python@v6
      # We should install one Python that is higher than 3+ for SQL and Yarn because:
      # - SQL component also has Python related tests, for example, IntegratedUDFTestUtils.
      # - Yarn has a Python specific test too, for example, YarnClusterSuite.
      if: contains(matrix.modules, 'yarn') || (contains(matrix.modules, 'sql') && !contains(matrix.modules, 'sql-')) || contains(matrix.modules, 'connect')
      with:
        python-version: '3.12'
        architecture: x64
    - name: Install Python packages (Python 3.12)
      if: (contains(matrix.modules, 'sql') && !contains(matrix.modules, 'sql-')) || contains(matrix.modules, 'connect') || contains(matrix.modules, 'yarn')
      run: |
        python3.12 -m pip install 'numpy>=1.23.2' pyarrow 'pandas==2.3.3' pyyaml scipy unittest-xml-reporting 'lxml==4.9.4' 'grpcio==1.76.0' 'grpcio-status==1.76.0' 'protobuf==6.33.5' 'zstandard==0.25.0'
        python3.12 -m pip list
    - name: Download precompiled artifact
      id: download-precompiled
      if: needs.precompile.result == 'success'
      continue-on-error: true
      uses: actions/download-artifact@v8
      with:
        name: spark-compile-${{ inputs.branch }}-${{ github.run_id }}
    - name: Extract precompiled artifact
      id: extract-precompiled
      if: steps.download-precompiled.outcome == 'success'
      continue-on-error: true
      run: |
        zstd -dc compile-artifact.tar.zst | tar -xf -
        rm compile-artifact.tar.zst
    # Run the tests.
    - name: Run tests
      env: ${{ fromJSON(inputs.envs) }}
      shell: 'script -q -e -c "bash {0}"'
      run: |
        # Fix for TTY related issues when launching the Ammonite REPL in tests.
        export TERM=vt100
        # Hive "other tests" test needs larger metaspace size based on experiment.
        if [[ "$MODULES_TO_TEST" == "hive" ]] && [[ "$EXCLUDED_TAGS" == "org.apache.spark.tags.SlowHiveTest" ]]; then export METASPACE_SIZE=2g; fi
        if [ "${{ steps.extract-precompiled.outcome }}" = "success" ]; then
          export SKIP_SCALA_BUILD=true
          echo "Reusing precompiled artifact, skipping local SBT build."
        fi
        export SERIAL_SBT_TESTS=1
        ./dev/run-tests --parallelism 1 --modules "$MODULES_TO_TEST" --included-tags "$INCLUDED_TAGS" --excluded-tags "$EXCLUDED_TAGS"
    - name: Upload test results to report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: test-results-${{ matrix.modules }}-${{ matrix.comment }}-${{ matrix.java }}-${{ matrix.hadoop }}-${{ matrix.hive }}
        path: |
          **/target/test-reports/*.xml
          **/target/surefire-reports/*.xml
    - name: Test Summary
      if: always()
      uses: test-summary/action@37b508cfee6d4d080eedd00b5bb240a6a784a6a5 # v2.6
      with:
        paths: |
          **/target/test-reports/*.xml
          **/target/surefire-reports/*.xml
    - name: Upload unit tests log files
      if: ${{ !success() }}
      uses: actions/upload-artifact@v7
      with:
        name: unit-tests-log-${{ matrix.modules }}-${{ matrix.comment }}-${{ matrix.java }}-${{ matrix.hadoop }}-${{ matrix.hive }}
        path: "**/target/*.log"
    - name: Upload yarn app log files
      if: ${{ !success() && contains(matrix.modules, 'yarn') }}
      uses: actions/upload-artifact@v7
      with:
        name: yarn-app-log-${{ matrix.comment }}-${{ matrix.java }}-${{ matrix.hadoop }}-${{ matrix.hive }}
        path: "**/target/test/data/"

  infra-image:
    name: "Base image build"
    needs: precondition
    if: >-
      fromJson(needs.precondition.outputs.required).pyspark == 'true' ||
      fromJson(needs.precondition.outputs.required).pyspark-pandas == 'true' ||
      fromJson(needs.precondition.outputs.required).lint == 'true' ||
      fromJson(needs.precondition.outputs.required).docs == 'true' ||
      fromJson(needs.precondition.outputs.required).sparkr == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Checkout Spark repository
        uses: actions/checkout@v6
        # In order to fetch changed files
        with:
          fetch-depth: 0
          repository: apache/spark
          ref: ${{ needs.precondition.outputs.head_sha }}
      - name: Sync the current branch with the latest in Apache Spark
        if: github.repository != 'apache/spark'
        run: |
          echo "APACHE_SPARK_REF=$(git rev-parse HEAD)" >> $GITHUB_ENV
          git fetch https://github.com/$GITHUB_REPOSITORY.git ${GITHUB_REF#refs/heads/}
          git -c user.name='Apache Spark Test Account' -c user.email='sparktestacc@gmail.com' merge --no-commit --progress --squash FETCH_HEAD
          git -c user.name='Apache Spark Test Account' -c user.email='sparktestacc@gmail.com' commit -m "Merged commit" --allow-empty
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
      - name: Build and push (Documentation)
        if: ${{ fromJson(needs.precondition.outputs.required).docs == 'true' && hashFiles('dev/spark-test-image/docs/Dockerfile') != '' }}
        id: docker_build_docs
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: ./dev/spark-test-image/docs/
          push: true
          tags: |
            ${{ needs.precondition.outputs.image_docs_url }}
          # Use the infra image cache to speed up
          cache-from: type=registry,ref=ghcr.io/apache/spark/apache-spark-github-action-image-docs-cache:${{ inputs.branch }}
      - name: Build and push (Linter)
        if: ${{ fromJson(needs.precondition.outputs.required).lint == 'true' && hashFiles('dev/spark-test-image/lint/Dockerfile') != '' }}
        id: docker_build_lint
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: ./dev/spark-test-image/lint/
          push: true
          tags: |
            ${{ needs.precondition.outputs.image_lint_url }}
          # Use the infra image cache to speed up
          cache-from: type=registry,ref=ghcr.io/apache/spark/apache-spark-github-action-image-lint-cache:${{ inputs.branch }}
      - name: Build and push (SparkR)
        if: ${{ fromJson(needs.precondition.outputs.required).sparkr == 'true' && hashFiles('dev/spark-test-image/sparkr/Dockerfile') != '' }}
        id: docker_build_sparkr
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: ./dev/spark-test-image/sparkr/
          push: true
          tags: |
            ${{ needs.precondition.outputs.image_sparkr_url }}
          # Use the infra image cache to speed up
          cache-from: type=registry,ref=ghcr.io/apache/spark/apache-spark-github-action-image-sparkr-cache:${{ inputs.branch }}
      - name: Build and push (PySpark with ${{ env.PYSPARK_IMAGE_TO_TEST }})
        if: ${{ (fromJson(needs.precondition.outputs.required).pyspark == 'true' || fromJson(needs.precondition.outputs.required).pyspark-pandas == 'true') && env.PYSPARK_IMAGE_TO_TEST != '' }}
        id: docker_build_pyspark
        env: ${{ fromJSON(inputs.envs) }}
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: ./dev/spark-test-image/${{ env.PYSPARK_IMAGE_TO_TEST }}/
          push: true
          tags: |
            ${{ needs.precondition.outputs.image_pyspark_url }}
          # Use the infra image cache to speed up
          cache-from: type=registry,ref=ghcr.io/apache/spark/apache-spark-github-action-image-pyspark-${{ env.PYSPARK_IMAGE_TO_TEST }}-cache:${{ inputs.branch }}


  precompile:
    needs: precondition
    if: >-
      (!cancelled()) && (
        fromJson(needs.precondition.outputs.required).build == 'true' ||
        fromJson(needs.precondition.outputs.required).pyspark == 'true' ||
        fromJson(needs.precondition.outputs.required).pyspark-pandas == 'true' ||
        fromJson(needs.precondition.outputs.required).pyspark-install == 'true' ||
        fromJson(needs.precondition.outputs.required).sparkr == 'true' ||
        fromJson(needs.precondition.outputs.required).docker-integration-tests == 'true' ||
        fromJson(needs.precondition.outputs.required).k8s-integration-tests == 'true' ||
        fromJson(needs.precondition.outputs.required).tpcds-1g == 'true')
    name: "Precompile Spark"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Optional optimization: if this job fails or is cancelled, the pyspark
    # matrix entries fall back to running the SBT build locally as before.
    continue-on-error: true
    env:
      HADOOP_PROFILE: ${{ inputs.hadoop }}
      HIVE_PROFILE: hive2.3
      GITHUB_PREV_SHA: ${{ github.event.before }}
    steps:
    - name: Checkout Spark repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        repository: apache/spark
        ref: ${{ needs.precondition.outputs.head_sha }}
    - name: Sync the current branch with the latest in Apache Spark
      if: github.repository != 'apache/spark'
      run: |
        echo "APACHE_SPARK_REF=$(git rev-parse HEAD)" >> $GITHUB_ENV
        git fetch https://github.com/$GITHUB_REPOSITORY.git ${GITHUB_REF#refs/heads/}
        git -c user.name='Apache Spark Test Account' -c user.email='sparktestacc@gmail.com' merge --no-commit --progress --squash FETCH_HEAD
        git -c user.name='Apache Spark Test Account' -c user.email='sparktestacc@gmail.com' commit -m "Merged commit" --allow-empty
    - name: Cache SBT and Maven
      uses: actions/cache@v5
      with:
        path: |
          build/apache-maven-*
          build/*.jar
          ~/.sbt
        key: build-${{ runner.os }}-${{ hashFiles('**/pom.xml', 'project/build.properties', 'build/mvn', 'build/sbt', 'build/sbt-launch-lib.bash', 'build/spark-build-info') }}
        restore-keys: |
          build-${{ runner.os }}-
    - name: Cache Coursier local repository
      uses: actions/cache@v5
      with:
        path: ~/.cache/coursier
        key: coursier-${{ runner.os }}-${{ hashFiles('**/pom.xml', '**/plugins.sbt') }}
        restore-keys: |
          coursier-${{ runner.os }}-
    - name: Install Java ${{ inputs.java }}
      uses: actions/setup-java@v5
      with:
        distribution: zulu
        java-version: ${{ inputs.java }}
    - name: Build Spark
      run: |
        ./build/sbt -Phadoop-3 -Pyarn -Pspark-ganglia-lgpl -Phadoop-cloud -Phive \
          -Pkubernetes -Pjvm-profiler -Pkinesis-asl -Phive-thriftserver \
          -Pdocker-integration-tests -Pkubernetes-integration-tests -Pvolcano \
          Test/package streaming-kinesis-asl-assembly/assembly connect/assembly assembly/package
    - name: Package compile output
      run: |
        find . -type d -name target -not -path './build/*' -not -path './.git/*' -print0 \
          | tar --null -cf - -T - | zstd -c -T0 > compile-artifact.tar.zst
        ls -lh compile-artifact.tar.zst
    - name: Upload compile artifact
      uses: actions/upload-artifact@v7
      with:
        name: spark-compile-${{ inputs.branch }}-${{ github.run_id }}
        path: compile-artifact.tar.zst
        retention-days: 1
        if-no-files-found: error

  pyspark:
    needs: [precondition, infra-image, precompile]
    # always run if pyspark == 'true', even infra-image is skip (such as non-master job)
    if: (!cancelled()) && (fromJson(needs.precondition.outputs.required).pyspark == 'true' || fromJson(needs.precondition.outputs.required).pyspark-pandas == 'true')
    name: "Build modules: ${{ matrix.modules }}"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    container:
      image: ${{ needs.precondition.outputs.image_pyspark_url_link }}
      options: >-
        --cap-add=SYS_PTRACE
        --security-opt seccomp=unconfined
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        java:
          - ${{ inputs.java }}
        modules:
          - >-
            pyspark-sql, pyspark-resource, pyspark-testing, pyspark-core, pyspark-errors, pyspark-logger
          - >-
            pyspark-mllib, pyspark-ml, pyspark-ml-connect, pyspark-pipelines
          - >-
            pyspark-streaming, pyspark-structured-streaming, pyspark-structured-streaming-connect
          - >-
            pyspark-connect
          - >-
            pyspark-connect-old-client
          - >-
            pyspark-install
          - >-
            pyspark-pandas
          - >-
            pyspark-pandas-slow
          - >-
            pyspark-pandas-connect
          - >-
            pyspark-pandas-slow-connect
        exclude:
          # Always run if pyspark == 'true', even infra-image is skip (such as non-master job)
          # In practice, the build will run in individual PR, but not against the individual commit
          # in Apache Spark repository.
          - modules: ${{ fromJson(needs.precondition.outputs.required).pyspark != 'true' && 'pyspark-sql, pyspark-resource, pyspark-testing, pyspark-core, pyspark-errors, pyspark-logger' }}
          - modules: ${{ fromJson(needs.precondition.outputs.required).pyspark != 'true' && 'pyspark-mllib, pyspark-ml, pyspark-ml-connect' }}
          - modules: ${{ fromJson(needs.precondition.outputs.required).pyspark != 'true' && 'pyspark-streaming, pyspark-structured-streaming, pyspark-structured-streaming-connect' }}
          - modules: ${{ fromJson(needs.precondition.outputs.required).pyspark != 'true' && 'pyspark-connect' }}
          - modules: ${{ fromJson(needs.precondition.outputs.required).pyspark-connect-old-client != 'true' &&  'pyspark-connect-old-client'}}
          # pyspark-install is very slow so we only run it when it's changed or explicity requested
          - modules: ${{ fromJson(needs.precondition.outputs.required).pyspark-install != 'true' && 'pyspark-install' }}
          # Always run if pyspark-pandas == 'true', even infra-image is skip (such as non-master job)
          # In practice, the build will run in individual PR, but not against the individual commit
          # in Apache Spark repository.
          - modules: ${{ fromJson(needs.precondition.outputs.required).pyspark-pandas != 'true' && 'pyspark-pandas' }}
          - modules: ${{ fromJson(needs.precondition.outputs.required).pyspark-pandas != 'true' && 'pyspark-pandas-slow' }}
          - modules: ${{ fromJson(needs.precondition.outputs.required).pyspark-pandas != 'true' && 'pyspark-pandas-connect' }}
          - modules: ${{ fromJson(needs.precondition.outputs.required).pyspark-pandas != 'true' && 'pyspark-pandas-slow-connect' }}
    env:
      MODULES_TO_TEST: ${{ matrix.modules }}
      HADOOP_PROFILE: ${{ inputs.hadoop }}
      HIVE_PROFILE: hive2.3
      GITHUB_PREV_SHA: ${{ github.event.before }}
      SPARK_LOCAL_IP: localhost
      SKIP_UNIDOC: true
      SKIP_MIMA: true
      SKIP_PACKAGING: true
      METASPACE_SIZE: 1g
      BRANCH: ${{ inputs.branch }}
      PYSPARK_TEST_TIMEOUT: 450
    steps:
    - name: Checkout Spark repository
      uses: actions/checkout@v6
      # In order to fetch changed files
      with:
        fetch-depth: 0
        repository: apache/spark
        ref: ${{ needs.precondition.outputs.head_sha }}
    - name: Add GITHUB_WORKSPACE to git trust safe.directory
      run: |
        git config --global --add safe.directory ${GITHUB_WORKSPACE}
    - name: Sync the current branch with the latest in Apache Spark
      if: github.repository != 'apache/spark'
      run: |
        echo "APACHE_SPARK_REF=$(git rev-parse HEAD)" >> $GITHUB_ENV
        git fetch https://github.com/$GITHUB_REPOSITORY.git ${GITHUB_REF#refs/heads/}
        git -c user.name='Apache Spark Test Account' -c user.email='sparktestacc@gmail.com' merge --no-commit --progress --squash FETCH_HEAD
        git -c user.name='Apache Spark Test Account' -c user.email='sparktestacc@gmail.com' commit -m "Merged commit" --allow-empty
    # Cache local repositories. Note that GitHub Actions cache has a 10G limit.
    - name: Cache SBT and Maven
      uses: actions/cache@v5
      with:
        path: |
          build/apache-maven-*
          build/*.jar
          ~/.sbt
        key: build-${{ runner.os }}-${{ hashFiles('**/pom.xml', 'project/build.properties', 'build/mvn', 'build/sbt', 'build/sbt-launch-lib.bash', 'build/spark-build-info') }}
        restore-keys: |
          build-${{ runner.os }}-
    - name: Restore Coursier local repository
      uses: actions/cache/restore@v5
      with:
        path: ~/.cache/coursier
        key: coursier-${{ runner.os }}-${{ hashFiles('**/pom.xml', '**/plugins.sbt') }}
        restore-keys: |
          coursier-${{ runner.os }}-
    - name: Free up disk space
      shell: 'script -q -e -c "bash {0}"'
      run: ./dev/free_disk_space_container
    - name: Install Java ${{ matrix.java }}
      uses: actions/setup-java@v5
      with:
        distribution: zulu
        java-version: ${{ matrix.java }}
    - name: List Python packages (${{ env.PYTHON_TO_TEST }})
      if: ${{ env.PYTHON_TO_TEST != '' }}
      env: ${{ fromJSON(inputs.envs) }}
      shell: 'script -q -e -c "bash {0}"'
      run: |
        lsb_release -a
        for py in $(echo $PYTHON_TO_TEST | tr "," "\n")
        do
          $py --version
          $py -m pip list
          echo ""
        done
    - name: Download precompiled artifact
      id: download-precompiled
      if: needs.precompile.result == 'success'
      continue-on-error: true
      uses: actions/download-artifact@v8
      with:
        name: spark-compile-${{ inputs.branch }}-${{ github.run_id }}
    - name: Extract precompiled artifact
      id: extract-precompiled
      if: steps.download-precompiled.outcome == 'success'
      continue-on-error: true
      run: |
        zstd -dc compile-artifact.tar.zst | tar -xf -
        rm compile-artifact.tar.zst
    # Run the tests.
    - name: Run tests
      env: ${{ fromJSON(inputs.envs) }}
      if: ${{ matrix.modules != 'pyspark-connect-old-client' }}
      shell: 'script -q -e -c "bash {0}"'
      run: |
        if [ "${{ steps.extract-precompiled.outcome }}" = "success" ]; then
          export SKIP_SCALA_BUILD=true
          echo "Reusing precompiled artifact, skipping local SBT build."
        fi
        if [[ "$MODULES_TO_TEST" == *"pyspark-install"* ]]; then
          export SKIP_PACKAGING=false
          echo "Python Packaging Tests Enabled!"
        fi
        ./dev/run-tests --parallelism 1 --modules "$MODULES_TO_TEST" --python-executables "$PYTHON_TO_TEST"
    - name: Run tests for old client
      env:
        SPARK_TESTING: 1
        SPARK_SKIP_CONNECT_COMPAT_TESTS: 1
        SPARK_CONNECT_TESTING_REMOTE: sc://localhost
      if: ${{ matrix.modules == 'pyspark-connect-old-client' && inputs.branch == 'master' }}
      run: |
        # Build Spark
        if [ "${{ steps.extract-precompiled.outcome }}" = "success" ]; then
          echo "Reusing precompiled artifact, skipping local SBT build."
        else
          ./build/sbt -Phive Test/package
        fi

        # Make less noisy
        cp conf/log4j2.properties.template conf/log4j2.properties
        sed -i 's/rootLogger.level = info/rootLogger.level = warn/g' conf/log4j2.properties

        # Start a Spark Connect server for local
        PYTHONPATH="python/lib/pyspark.zip:python/lib/py4j-0.10.9.9-src.zip:$PYTHONPATH" ./sbin/start-connect-server.sh \
          --driver-java-options "-Dlog4j.configurationFile=file:$GITHUB_WORKSPACE/conf/log4j2.properties" \
          --jars "`find connector/protobuf/target -name spark-protobuf-*SNAPSHOT.jar`,`find connector/avro/target -name spark-avro*SNAPSHOT.jar`" \
          --conf spark.sql.execution.arrow.pyspark.validateSchema.enabled=false \
          --conf spark.sql.execution.pandas.convertToArrowArraySafely=false

        # Checkout to branch-4.0 to use the tests in branch-4.0.
        cd ..
        git clone --single-branch --branch branch-4.0 https://github.com/apache/spark.git spark-4.0
        cd spark-4.0

        # Several tests related to catalog requires to run them sequencially, e.g., writing a table in a listener.
        # Run branch-4.0 tests
        ./python/run-tests --parallelism=1 --python-executables=python3 --modules pyspark-connect
        # None of tests are dependent on each other in Pandas API on Spark so run them in parallel
        ./python/run-tests --parallelism=1 --python-executables=python3 --modules pyspark-pandas-connect,pyspark-pandas-slow-connect
    - name: Upload coverage to Codecov
      if: fromJSON(inputs.envs).PYSPARK_CODECOV == 'true'
      uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
      env:
        CODECOV_TOKEN: ${{ secrets.codecov_token }}
      with:
        files: ./python/coverage.xml
        flags: unittests
        name: PySpark
        verbose: true
    - name: Upload test results to Codecov
      env: ${{ fromJSON(inputs.envs) }}
      if: fromJSON(inputs.envs).PYSPARK_CODECOV == 'true'
      uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
      with:
        report_type: 'test_results'
        files: '**/target/test-reports/*.xml'
        flags: ${{ env.PYTHON_TO_TEST }}-${{ inputs.branch }}
        name: PySpark-Test-Results
        token: ${{ secrets.codecov_token }}
    - name: Upload test results to report
      env: ${{ fromJSON(inputs.envs) }}
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: test-results-${{ matrix.modules }}--${{ matrix.java }}-${{ inputs.hadoop }}-hive2.3-${{ env.PYTHON_TO_TEST }}
        path: |
          **/target/test-reports/*.xml
          **/target/surefire-reports/*.xml
    - name: Test Summary
      if: always()
      uses: test-summary/action@37b508cfee6d4d080eedd00b5bb240a6a784a6a5 # v2.6
      with:
        paths: |
          **/target/test-reports/*.xml
          **/target/surefire-reports/*.xml
    - name: Upload unit tests log files
      env: ${{ fromJSON(inputs.envs) }}
      if: ${{ !success() }}
      uses: actions/upload-artifact@v7
      with:
        name: unit-tests-log-${{ matrix.modules }}--${{ matrix.java }}-${{ inputs.hadoop }}-hive2.3-${{ env.PYTHON_TO_TEST }}
        path: "**/target/unit-tests.log"


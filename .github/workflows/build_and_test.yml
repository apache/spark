        key: build-${{ runner.os }}-${{ hashFiles('**/pom.xml', 'project/build.properties', 'build/mvn', 'build/sbt', 'build/sbt-launch-lib.bash', 'build/spark-build-info') }}
        restore-keys: |
          build-${{ runner.os }}-
    - name: Restore Coursier local repository
      uses: actions/cache/restore@v5
      with:
        path: ~/.cache/coursier
        key: coursier-${{ runner.os }}-${{ hashFiles('**/pom.xml', '**/plugins.sbt') }}
        restore-keys: |
          coursier-${{ runner.os }}-
    - name: Cache Maven local repository
      uses: actions/cache@v5
      with:
        path: ~/.m2/repository
        key: docs-maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          docs-maven-${{ runner.os }}-
    - name: Free up disk space
      run: ./dev/free_disk_space_container
    - name: Install Java ${{ inputs.java }}
      uses: actions/setup-java@v5
      with:
        distribution: zulu
        java-version: ${{ inputs.java }}
    - name: License test
      run: ./dev/check-license
    - name: Dependencies test
      run: ./dev/test-dependencies.sh
    - name: MIMA test
      run: ./dev/mima
    - name: Scala linter
      run: ./dev/lint-scala
    # The config binding policy exceptions file lists pre-existing configs that were created before
    # the binding policy was introduced. It must never grow: new configs must declare a binding
    # policy via .withBindingPolicy() instead of being added to the exceptions file. This step fails
    # if a PR adds entries to the file. It only runs on forks because PR builds run there, and the
    # diff against apache/spark master is exactly the PR's change.
    - name: Config binding policy exceptions check
      if: github.repository != 'apache/spark'
      run: |
        EXCEPTIONS_FILE="sql/hive/src/test/resources/conf/binding-policy-exceptions/configs-without-binding-policy-exceptions"
        if [ ! -f "$EXCEPTIONS_FILE" ]; then
          echo "$EXCEPTIONS_FILE does not exist on this branch, skipping."
          exit 0
        fi
        ADDED_ENTRIES=$(git diff "$APACHE_SPARK_REF" HEAD -- "$EXCEPTIONS_FILE" | grep '^+' | grep -v '^+++' || true)
        if [ -n "$ADDED_ENTRIES" ]; then
          echo "ERROR: This PR adds the following entries to $EXCEPTIONS_FILE:"
          echo "$ADDED_ENTRIES"
          echo ""
          echo "This file is a frozen list of configs that predate the binding policy, and new"
          echo "entries must not be added to it. Instead, declare a binding policy when building"
          echo "the config entry, e.g."
          echo "  .withBindingPolicy(ConfigBindingPolicy.SESSION/PERSISTED/NOT_APPLICABLE)"
          echo "See the scaladoc of org.apache.spark.internal.config.ConfigBindingPolicy for the"
          echo "semantics of each policy and how to choose one."
          exit 1
        fi
        echo "No new entries added to the binding policy exceptions file."
    - name: Scala structured logging check
      if: hashFiles('dev/structured_logging_style.py') != ''
      shell: 'script -q -e -c "bash {0}"'
      run: |
        python3.12 ./dev/structured_logging_style.py
    - name: Java linter
      run: ./dev/lint-java
    - name: Spark connect jvm client mima check
      run: ./dev/connect-jvm-client-mima-check
    - name: List Python packages
      shell: 'script -q -e -c "bash {0}"'
      run: |
        lsb_release -a
        python3.12 --version
        python3.12 -m pip list
    - name: Python linter
      shell: 'script -q -e -c "bash {0}"'
      run: |
        PYTHON_EXECUTABLE=python3.12 ./dev/lint-python
    - name: JS linter
      run: ./dev/lint-js
    - name: Install R linter dependencies and SparkR
      run: ./R/install-dev.sh
    - name: R linter
      run: ./dev/lint-r

  java25:
    needs: [precondition]
    if: fromJson(needs.precondition.outputs.required).java25 == 'true'
    name: Java 25 build with Maven
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        distribution: zulu
        java-version: 25
    - name: Build with Maven
      run: |
        export MAVEN_OPTS="-Xss64m -Xmx4g -Xms4g -XX:ReservedCodeCacheSize=128m -Dorg.slf4j.simpleLogger.defaultLogLevel=WARN"
        export MAVEN_CLI_OPTS="--no-transfer-progress"
        ./build/mvn $MAVEN_CLI_OPTS -DskipTests -Pyarn -Pkubernetes -Pvolcano -Phive -Phive-thriftserver -Phadoop-cloud -Pjvm-profiler -Pspark-ganglia-lgpl -Pkinesis-asl clean install

  # SPARK-58200: Scala 3 cross-build. Only the modules listed below compile under Scala 3
  # today; the rest of the reactor still needs source migration (SPARK-54150). This job
  # guards the two things the scala-3 profile promises: that the version switch is
  # reversible, and that the modules that do build keep building.
  #
  # Scope, deliberately narrow: main sources only. Test sources are not migrated yet and
  # do not compile, so SBT builds `compile` and Maven runs with -Dmaven.test.skip=true.
  # Both build tools are covered because the two paths diverge: the scala-3 profile's
  # compiler arguments and scaladoc settings apply only to Maven, and SBT resolves the
  # module graph itself rather than through the reactor.
  scala3:
    needs: [precondition]
    if: fromJson(needs.precondition.outputs.required).scala3 == 'true'
    name: Scala 3 build (${{ matrix.build-tool }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        build-tool:
          - sbt
          - maven
    env:
      # Modules whose main sources compile under Scala 3, given as directories.
      # Extend as SPARK-54150 subtasks land; this is the only list to update. Maven
      # takes these directly, and the SBT project names are read out of each POM
      # below, since SBT addresses projects by <sbt.project.name> rather than by path
      # and the two cannot be derived from one another by rule.
      SCALA3_MODULES: >-
        common/tags
        common/utils
        common/utils-java
        common/unsafe
        common/kvstore
        common/variant
        common/sketch
        launcher
        common/network-common
        common/network-shuffle
        sql/connect/shims
        udf/worker/proto
        udf/worker/core
        udf/worker/grpc
      # Modules above that publish a test-jar the others depend on. Maven resolves
      # test-scope dependencies even when it is not compiling tests, so these have to
      # be packaged before the main-sources-only pass, and -Dmaven.test.skip suppresses
      # test-jar packaging along with test compilation. Their test sources are Java
      # only, so this pass never invokes the Scala 3 compiler.
      SCALA3_TEST_JAR_MODULES: >-
        common/tags
        common/network-common
        common/utils-java
    steps:
    - name: Checkout Spark repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        repository: apache/spark
        ref: ${{ inputs.branch }}
    - name: Sync the current branch with the latest in Apache Spark
      if: github.repository != 'apache/spark'
      run: |
        git fetch https://github.com/$GITHUB_REPOSITORY.git ${GITHUB_REF#refs/heads/}
        git -c user.name='Apache Spark Test Account' -c user.email='sparktestacc@gmail.com' merge --no-commit --progress --squash FETCH_HEAD
        git -c user.name='Apache Spark Test Account' -c user.email='sparktestacc@gmail.com' commit -m "Merged commit" --allow-empty
    - name: Cache SBT and Maven
      uses: actions/cache@v5
      with:
        path: |
          build/apache-maven-*
          build/*.jar
          ~/.sbt
        key: build-${{ runner.os }}-${{ hashFiles('**/pom.xml', 'project/build.properties', 'build/mvn', 'build/sbt', 'build/sbt-launch-lib.bash', 'build/spark-build-info') }}
        restore-keys: |
          build-${{ runner.os }}-
    # Own keys: this is the only Scala 3 build, so the shared caches hold none of the
    # Scala 3 artifacts and cross-restoring would just save a copy of the 2.13 closure
    # under these keys.
    - name: Cache Coursier local repository
      if: matrix.build-tool == 'sbt'
      uses: actions/cache@v5
      with:
        path: ~/.cache/coursier
        key: coursier-scala3-${{ runner.os }}-${{ hashFiles('**/pom.xml', '**/plugins.sbt') }}
        restore-keys: |
          coursier-scala3-${{ runner.os }}-
    - name: Cache Maven local repository
      if: matrix.build-tool == 'maven'
      uses: actions/cache@v5
      with:
        path: ~/.m2/repository
        key: maven-scala3-${{ runner.os }}-java${{ inputs.java }}-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          maven-scala3-${{ runner.os }}-java${{ inputs.java }}-
    - name: Install Java ${{ inputs.java }}
      uses: actions/setup-java@v5
      with:
        distribution: zulu
        java-version: ${{ inputs.java }}
    - name: Check that the Scala version switch is reversible
      run: |
        ./dev/change-scala-version.sh 3
        ./dev/change-scala-version.sh 2.13
        # Switching to Scala 3 and back must be a no-op. If this fails, a POM was
        # rewritten in one direction but not the other.
        git diff --exit-code
    - name: Build with SBT
      if: matrix.build-tool == 'sbt'
      run: |
        ./dev/change-scala-version.sh 3
        # Read the SBT project name out of each module POM. Falling back to the
        # artifactId when the property is missing would silently build the wrong
        # project, or nothing at all, so treat that as an error instead.
        sbt_commands=""
        for module in $SCALA3_MODULES; do
          name=$(grep -o '<sbt.project.name>[^<]*' "$module/pom.xml" | head -1 | cut -d'>' -f2)
          if [ -z "$name" ]; then
            echo "ERROR: $module/pom.xml declares no <sbt.project.name>, so the SBT"
            echo "       project name cannot be derived. Add the property to that POM."
            exit 1
          fi
          sbt_commands="$sbt_commands $name/compile"
        done
        echo "SBT commands:$sbt_commands"
        ./build/sbt -Pscala-3 $sbt_commands
    - name: Build with Maven
      if: matrix.build-tool == 'maven'
      run: |
        ./dev/change-scala-version.sh 3
        export MAVEN_OPTS="-Xss64m -Xmx4g -Xms4g -XX:ReservedCodeCacheSize=128m -Dorg.slf4j.simpleLogger.defaultLogLevel=WARN"
        export MVN="./build/mvn --no-transfer-progress -Pscala-3"
        # Package the test-jars the module set depends on. -DskipTests, not
        # -Dmaven.test.skip, because the jars have to be built; only their execution is
        # skipped. These modules have Java test sources only.
        $MVN -DskipTests \
          -pl "$(echo $SCALA3_TEST_JAR_MODULES | tr ' ' ',')" -am install
        # Then build main sources only, matching what the SBT leg compiles. Test sources
        # are not migrated to Scala 3 yet, so -Dmaven.test.skip keeps them out; the
        # test-jars they would otherwise have produced came from the pass above.
        # -DskipTests as well because scalatest-maven-plugin reads that rather than
        # maven.test.skip, and would otherwise run whatever test classes it finds.
        # -am pulls in the parent POM.
        $MVN -Dmaven.test.skip=true -DskipTests \
          -pl "$(echo $SCALA3_MODULES | tr ' ' ',')" -am install
    - name: Check that the Scala 3 compiler actually ran
      run: |
        # Only dotty emits .tasty files, so their presence rules out a silent
        # fallback to the Scala 2 compiler. The set of modules to check is derived
        # from what was built rather than hand-listed, so it cannot drift from
        # SCALA3_MODULES.
        if [ '${{ matrix.build-tool }}' = 'sbt' ]; then
          # SBT writes to target/scala-<full compiler version>. Pinning to the exact
          # version stops leftovers from a previous scala3.version satisfying the check.
          version=$(./build/mvn -q help:evaluate -Dexpression=scala3.version -DforceStdout -N)
        else
          # Maven's outputDirectory follows scala.binary.version, which is just "3".
          version=3
        fi
        echo "Checking target/scala-$version output directories"
        checked=0
        for classes in $(find . -type d -path "*/target/scala-$version/classes" | sort); do
          module=${classes%%/target/*}
          # Java-only modules legitimately produce no .tasty files.
          if [ -z "$(find "$module/src/main" -name '*.scala' 2>/dev/null | head -1)" ]; then
            continue
          fi
          count=$(find "$classes" -name '*.tasty' | wc -l)
          echo "$module: $count .tasty file(s)"
          if [ "$count" -eq 0 ]; then
            echo "ERROR: $module has Scala sources but emitted no .tasty files;"
            echo "       the Scala 3 compiler did not run for it."
            exit 1
          fi
          checked=$((checked + 1))
        done
        if [ "$checked" -eq 0 ]; then
          echo "ERROR: no module with Scala sources was verified; the build produced nothing."
          exit 1
        fi
        echo "Verified $checked module(s) compiled by the Scala 3 compiler."

  # Documentation build
  docs:
    needs: [precondition, infra-image]
    # always run if lint == 'true', even infra-image is skip (such as non-master job)
    if: (!cancelled()) && fromJson(needs.precondition.outputs.required).docs == 'true'
    name: Documentation generation
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      LC_ALL: C.UTF-8
      LANG: C.UTF-8
      PYSPARK_DRIVER_PYTHON: python3.9
      PYSPARK_PYTHON: python3.9
      GITHUB_PREV_SHA: ${{ github.event.before }}
    container:
      image: ${{ needs.precondition.outputs.image_docs_url_link }}
    steps:
    - name: Checkout Spark repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        repository: apache/spark
        ref: ${{ needs.precondition.outputs.head_sha }}
    - name: Add GITHUB_WORKSPACE to git trust safe.directory
      run: |
        git config --global --add safe.directory ${GITHUB_WORKSPACE}
    - name: Sync the current branch with the latest in Apache Spark
      if: github.repository != 'apache/spark'
      run: |
        echo "APACHE_SPARK_REF=$(git rev-parse HEAD)" >> $GITHUB_ENV
        git fetch https://github.com/$GITHUB_REPOSITORY.git ${GITHUB_REF#refs/heads/}
        git -c user.name='Apache Spark Test Account' -c user.email='sparktestacc@gmail.com' merge --no-commit --progress --squash FETCH_HEAD
        git -c user.name='Apache Spark Test Account' -c user.email='sparktestacc@gmail.com' commit -m "Merged commit" --allow-empty
    # Cache local repositories. Note that GitHub Actions cache has a 10G limit.
    - name: Cache SBT and Maven
      uses: actions/cache@v5
      with:
        path: |
          build/apache-maven-*
          build/*.jar
          ~/.sbt
        key: build-${{ runner.os }}-${{ hashFiles('**/pom.xml', 'project/build.properties', 'build/mvn', 'build/sbt', 'build/sbt-launch-lib.bash', 'build/spark-build-info') }}
        restore-keys: |
          build-${{ runner.os }}-
    - name: Restore Coursier local repository
      uses: actions/cache/restore@v5
      with:
        path: ~/.cache/coursier
        key: coursier-${{ runner.os }}-${{ hashFiles('**/pom.xml', '**/plugins.sbt') }}
        restore-keys: |
          coursier-${{ runner.os }}-
    - name: Cache Maven local repository
      uses: actions/cache@v5
      with:
        path: ~/.m2/repository
        key: docs-maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          docs-maven-${{ runner.os }}-
    - name: Free up disk space
      run: ./dev/free_disk_space_container
    - name: Install Java ${{ inputs.java }}
      uses: actions/setup-java@v5
      with:
        distribution: zulu
        java-version: ${{ inputs.java }}
    - name: List Python packages
      run: |
        lsb_release -a
        python3.12 -m pip list
    - name: Install dependencies for documentation generation
      run: |
        # Keep the version of Bundler here in sync with the following locations:
        #   - dev/create-release/spark-rm/Dockerfile
        #   - docs/README.md
        gem install bundler -v 2.4.22
        cd docs
        bundle install --retry=100
    - name: Run documentation build
      run: |
        # We need this link to make sure `python3` points to `python3.12` which contains the prerequisite packages.
        ln -s "$(which python3.12)" "/usr/local/bin/python3"
        # Build docs first with SKIP_API to ensure they are buildable without requiring any
        # language docs to be built beforehand.
        cd docs; SKIP_ERRORDOC=1 SKIP_API=1 bundle exec jekyll build; cd ..
        if [ -f "./dev/is-changed.py" ]; then
          # Skip PySpark and SparkR docs while keeping Scala/Java/SQL docs
          pyspark_modules=`cd dev && python3.12 -c "import sparktestsupport.modules as m; print(','.join(m.name for m in m.all_modules if m.name.startswith('pyspark')))"`
          if [ `./dev/is-changed.py -m $pyspark_modules` = false ]; then export SKIP_PYTHONDOC=1; fi
          if [ `./dev/is-changed.py -m sparkr` = false ]; then export SKIP_RDOC=1; fi
        fi
        export PYSPARK_DRIVER_PYTHON=python3.12
        export PYSPARK_PYTHON=python3.12
        # Print the values of environment variables `SKIP_ERRORDOC`, `SKIP_SCALADOC`, `SKIP_PYTHONDOC`, `SKIP_RDOC` and `SKIP_SQLDOC`
        echo "SKIP_ERRORDOC: $SKIP_ERRORDOC"
        echo "SKIP_SCALADOC: $SKIP_SCALADOC"
        echo "SKIP_PYTHONDOC: $SKIP_PYTHONDOC"
        echo "SKIP_RDOC: $SKIP_RDOC"
        echo "SKIP_SQLDOC: $SKIP_SQLDOC"
        cd docs
        bundle exec jekyll build
    - name: Tar documentation
      if: github.repository != 'apache/spark'
      run: tar cjf site.tar.bz2 docs/_site
    - name: Upload documentation
      if: github.repository != 'apache/spark'
      uses: actions/upload-artifact@v7
      with:
        name: site
        path: site.tar.bz2
        retention-days: 1

  # Any TPC-DS related updates on this job need to be applied to tpcds-1g-gen job of benchmark.yml as well
  tpcds-1g:
    needs: [precondition, precompile]
    if: (!cancelled()) && fromJson(needs.precondition.outputs.required).tpcds-1g == 'true'
    name: Run TPC-DS queries with SF=1
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      SPARK_LOCAL_IP: localhost
    steps:
    - name: Checkout Spark repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        repository: apache/spark
        ref: ${{ needs.precondition.outputs.head_sha }}
    - name: Sync the current branch with the latest in Apache Spark
      if: github.repository != 'apache/spark'
      run: |
        git fetch https://github.com/$GITHUB_REPOSITORY.git ${GITHUB_REF#refs/heads/}
        git -c user.name='Apache Spark Test Account' -c user.email='sparktestacc@gmail.com' merge --no-commit --progress --squash FETCH_HEAD
        git -c user.name='Apache Spark Test Account' -c user.email='sparktestacc@gmail.com' commit -m "Merged commit" --allow-empty
    - name: Cache SBT and Maven
      uses: actions/cache@v5
      with:
        path: |
          build/apache-maven-*
          build/*.jar
          ~/.sbt
        key: build-${{ runner.os }}-${{ hashFiles('**/pom.xml', 'project/build.properties', 'build/mvn', 'build/sbt', 'build/sbt-launch-lib.bash', 'build/spark-build-info') }}
        restore-keys: |
          build-${{ runner.os }}-
    - name: Restore Coursier local repository
      uses: actions/cache/restore@v5
      with:
        path: ~/.cache/coursier
        key: coursier-${{ runner.os }}-${{ hashFiles('**/pom.xml', '**/plugins.sbt') }}
        restore-keys: |
          coursier-${{ runner.os }}-
    - name: Install Java ${{ inputs.java }}
      uses: actions/setup-java@v5
      with:
        distribution: zulu
        java-version: ${{ inputs.java }}
    - name: Download precompiled artifact
      id: download-precompiled
      if: needs.precompile.result == 'success'
      continue-on-error: true
      uses: actions/download-artifact@v8
      with:
        name: spark-compile-${{ inputs.branch }}-${{ github.run_id }}
    - name: Extract precompiled artifact
      id: extract-precompiled
      if: steps.download-precompiled.outcome == 'success'
      continue-on-error: true
      run: |
        zstd -dc compile-artifact.tar.zst | tar -xf -
        rm compile-artifact.tar.zst
    - name: Cache TPC-DS generated data
      id: cache-tpcds-sf-1
      uses: actions/cache@v5
      with:
        path: ./tpcds-sf-1
        key: tpcds-${{ runner.os }}-${{ hashFiles('.github/workflows/build_and_test.yml', 'sql/core/src/test/scala/org/apache/spark/sql/TPCDSSchema.scala') }}
    - name: Checkout tpcds-kit repository
      if: steps.cache-tpcds-sf-1.outputs.cache-hit != 'true'
      uses: actions/checkout@v6
      with:
        repository: databricks/tpcds-kit
        ref: 1b7fb7529edae091684201fab142d956d6afd881
        path: ./tpcds-kit
    - name: Build tpcds-kit
      if: steps.cache-tpcds-sf-1.outputs.cache-hit != 'true'
      run: cd tpcds-kit/tools && make OS=LINUX
    - name: Generate TPC-DS (SF=1) table data
      if: steps.cache-tpcds-sf-1.outputs.cache-hit != 'true'
      run: build/sbt "sql/Test/runMain org.apache.spark.sql.GenTPCDSData --dsdgenDir `pwd`/tpcds-kit/tools --location `pwd`/tpcds-sf-1 --scaleFactor 1 --numPartitions 1 --overwrite"
    - name: Run TPC-DS queries (Sort merge join)
      run: |
        SPARK_TPCDS_DATA=`pwd`/tpcds-sf-1 build/sbt "sql/testOnly org.apache.spark.sql.TPCDSQueryTestSuite"
      env:
        SPARK_ANSI_SQL_MODE: ${{ fromJSON(inputs.envs).SPARK_ANSI_SQL_MODE }}
        SPARK_TPCDS_JOIN_CONF: |
          spark.sql.autoBroadcastJoinThreshold=-1
          spark.sql.join.preferSortMergeJoin=true
    - name: Run TPC-DS queries (Broadcast hash join)
      run: |
        SPARK_TPCDS_DATA=`pwd`/tpcds-sf-1 build/sbt "sql/testOnly org.apache.spark.sql.TPCDSQueryTestSuite"
      env:
        SPARK_ANSI_SQL_MODE: ${{ fromJSON(inputs.envs).SPARK_ANSI_SQL_MODE }}
        SPARK_TPCDS_JOIN_CONF: |
          spark.sql.autoBroadcastJoinThreshold=10485760
    - name: Run TPC-DS queries (Shuffled hash join)
      run: |
        SPARK_TPCDS_DATA=`pwd`/tpcds-sf-1 build/sbt "sql/testOnly org.apache.spark.sql.TPCDSQueryTestSuite"
      env:
        SPARK_ANSI_SQL_MODE: ${{ fromJSON(inputs.envs).SPARK_ANSI_SQL_MODE }}
        SPARK_TPCDS_JOIN_CONF: |
          spark.sql.autoBroadcastJoinThreshold=-1
          spark.sql.join.forceApplyShuffledHashJoin=true
    - name: Run TPC-DS queries on collated data
      run: |
        SPARK_TPCDS_DATA=`pwd`/tpcds-sf-1 build/sbt "sql/testOnly org.apache.spark.sql.TPCDSCollationQueryTestSuite"
    - name: Upload test results to report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: test-results-tpcds--${{ inputs.java }}-${{ inputs.hadoop }}-hive2.3
        path: |
          **/target/test-reports/*.xml
          **/target/surefire-reports/*.xml
    - name: Test Summary
      if: always()
      uses: test-summary/action@37b508cfee6d4d080eedd00b5bb240a6a784a6a5 # v2.6
      with:
        paths: |
          **/target/test-reports/*.xml
          **/target/surefire-reports/*.xml
    - name: Upload unit tests log files
      if: ${{ !success() }}
      uses: actions/upload-artifact@v7
      with:
        name: unit-tests-log-tpcds--${{ inputs.java }}-${{ inputs.hadoop }}-hive2.3
        path: "**/target/unit-tests.log"

  docker-integration-tests:
    needs: [precondition, precompile]
    if: (!cancelled()) && fromJson(needs.precondition.outputs.required).docker-integration-tests == 'true'
    name: Run Docker integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      HADOOP_PROFILE: ${{ inputs.hadoop }}
      HIVE_PROFILE: hive2.3
      GITHUB_PREV_SHA: ${{ github.event.before }}
      SPARK_LOCAL_IP: localhost
      SKIP_UNIDOC: true
      SKIP_MIMA: true
      SKIP_PACKAGING: true
    steps:
    - name: Checkout Spark repository
      uses: actions/checkout@v6
      with:

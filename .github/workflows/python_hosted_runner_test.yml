name: Build and test PySpark on macOS

on:
  workflow_call:
    inputs:
      java:
        required: false
        type: string
        default: 17
      python:
        required: false
        type: string
        default: 3.12
      branch:
        description: Branch to run the build against
        required: false
        type: string
        default: master
      hadoop:
        description: Hadoop version to run with. HADOOP_PROFILE environment variable should accept it.
        required: false
        type: string
        default: hadoop3
      os:
        description: OS to run this build.
        required: false
        type: string
        default: macos-15
      arch:
        description: The target architecture (x86, x64, arm64) of the Python interpreter.
        required: false
        type: string
        default: arm64
      envs:
        description: Additional environment variables to set when running the tests. Should be in JSON format.
        required: false
        type: string
        default: '{}'
jobs:
  # Precompile Spark with SBT once and publish target/ as an artifact for the
  # matrix entries below to consume. Optional: any failure here degrades the
  # matrix to its original local SBT build path.
  precompile:
    name: "Precompile Spark"
    runs-on: ${{ inputs.os }}
    # If this job fails or is cancelled, the matrix entries fall back to
    # running the SBT build locally as before.
    continue-on-error: true
    outputs:
      # Pinned so the build job checks out the same snapshot, even if the branch advances mid-run.
      head_sha: ${{ steps.checkout.outputs.head_sha }}
    env:
      HADOOP_PROFILE: ${{ inputs.hadoop }}
      HIVE_PROFILE: hive2.3
      SPARK_LOCAL_IP: localhost
      GITHUB_PREV_SHA: ${{ github.event.before }}
    steps:
      - name: Bootstrap composite actions
        uses: actions/checkout@v6
      - name: Checkout and sync Spark repository
        id: checkout
        uses: ./.github/actions/checkout-and-sync
        with:
          ref: ${{ inputs.branch }}
      - name: Cache SBT and Maven
        # TODO(SPARK-54466): https://github.com/actions/runner-images/issues/13341
        if: ${{ runner.os != 'macOS' }}
        uses: actions/cache@v5
        with:
          path: |
            build/apache-maven-*
            build/*.jar
            ~/.sbt
          key: build-${{ runner.os }}-${{ hashFiles('**/pom.xml', 'project/build.properties', 'build/mvn', 'build/sbt', 'build/sbt-launch-lib.bash', 'build/spark-build-info') }}
          restore-keys: |
            build-${{ runner.os }}-
      - name: Cache Coursier local repository
        # TODO(SPARK-54466): https://github.com/actions/runner-images/issues/13341
        if: ${{ runner.os != 'macOS' }}
        uses: actions/cache@v5
        with:
          path: ~/.cache/coursier
          key: coursier-${{ runner.os }}-${{ hashFiles('**/pom.xml', '**/plugins.sbt') }}
          restore-keys: |
            coursier-${{ runner.os }}-
      - name: Install Java ${{ inputs.java }}
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: ${{ inputs.java }}
      - name: Build Spark
        run: |
          ./build/sbt -Phadoop-3 -Pyarn -Pspark-ganglia-lgpl -Phadoop-cloud -Phive \
            -Pkubernetes -Pjvm-profiler -Pkinesis-asl -Phive-thriftserver \
            -Pdocker-integration-tests -Pvolcano \
            Test/package streaming-kinesis-asl-assembly/assembly connect/assembly assembly/package
      - name: Package compile output
        run: |
          find . -type d -name target -not -path './build/*' -not -path './.git/*' -print0 \
            | tar --null -cf - -T - | zstd -c -T0 > compile-artifact.tar.zst
          ls -lh compile-artifact.tar.zst
      - name: Upload compile artifact
        uses: actions/upload-artifact@v7
        with:
          name: spark-compile-${{ inputs.os }}-${{ inputs.branch }}-${{ github.run_id }}
          path: compile-artifact.tar.zst
          retention-days: 1
          if-no-files-found: error

  build:
    name: "Build modules: ${{ matrix.modules }}"
    needs: precompile
    if: (!cancelled())
    runs-on: ${{ inputs.os }}
    # TODO(SPARK-54466): https://github.com/actions/runner-images/issues/13341
    # timeout-minutes: 150
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        java:
          - ${{ inputs.java }}
        python:
          - ${{inputs.python}}
        modules:
          - >-
            pyspark-sql, pyspark-resource, pyspark-testing
          - >-
            pyspark-core, pyspark-errors, pyspark-streaming
          - >-
            pyspark-mllib, pyspark-ml, pyspark-ml-connect
          - >-
            pyspark-structured-streaming, pyspark-structured-streaming-connect
          - >-
            pyspark-connect
          - >-
            pyspark-pandas
          - >-
            pyspark-pandas-slow
          - >-
            pyspark-pandas-connect
          - >-
            pyspark-pandas-slow-connect
    env:
      MODULES_TO_TEST: ${{ matrix.modules }}
      PYTHON_TO_TEST: python${{inputs.python}}
      HADOOP_PROFILE: ${{ inputs.hadoop }}
      HIVE_PROFILE: hive2.3
      # GitHub Actions' default miniconda to use in pip packaging test.
      CONDA_PREFIX: /usr/share/miniconda
      GITHUB_PREV_SHA: ${{ github.event.before }}
      SPARK_LOCAL_IP: localhost
      SKIP_UNIDOC: true
      SKIP_MIMA: true
      SKIP_PACKAGING: true
      METASPACE_SIZE: 1g
      BRANCH: ${{ inputs.branch }}
      PYSPARK_TEST_TIMEOUT: 450
    steps:
      - name: Bootstrap composite actions
        uses: actions/checkout@v6
      - name: Checkout and sync Spark repository
        uses: ./.github/actions/checkout-and-sync
        with:
          ref: ${{ needs.precompile.outputs.head_sha || inputs.branch }}
      # Cache local repositories. Note that GitHub Actions cache has a 10G limit.
      - name: Cache SBT and Maven
        # TODO(SPARK-54466): https://github.com/actions/runner-images/issues/13341
        if: ${{ runner.os != 'macOS' }}
        uses: actions/cache@v5
        with:
          path: |
            build/apache-maven-*
            build/*.jar
            ~/.sbt
          key: build-${{ runner.os }}-${{ hashFiles('**/pom.xml', 'project/build.properties', 'build/mvn', 'build/sbt', 'build/sbt-launch-lib.bash', 'build/spark-build-info') }}
          restore-keys: |
            build-${{ runner.os }}-
      - name: Cache Coursier local repository
        # TODO(SPARK-54466): https://github.com/actions/runner-images/issues/13341
        if: ${{ runner.os != 'macOS' }}
        uses: actions/cache@v5
        with:
          path: ~/.cache/coursier
          key: coursier-${{ runner.os }}-${{ hashFiles('**/pom.xml', '**/plugins.sbt') }}
          restore-keys: |
            coursier-${{ runner.os }}-
      - name: Install Java ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: ${{ matrix.java }}
      - name: Install Python ${{matrix.python}}
        uses: actions/setup-python@v6
        with:
          python-version: ${{matrix.python}}
          architecture: ${{ inputs.arch }}
      - name: Install Python packages (Python ${{matrix.python}})
        run: |
          python${{matrix.python}} -m pip install --ignore-installed 'blinker>=1.6.2'
          python${{matrix.python}} -m pip install --ignore-installed 'six==1.16.0'
          python${{matrix.python}} -m pip install numpy 'pyarrow>=23.0.0' 'six==1.16.0' 'pandas==2.3.3' scipy 'plotly<6.0.0' 'mlflow>=2.8.1' coverage matplotlib openpyxl 'memory-profiler>=0.61.0' 'scikit-learn>=1.3.2' unittest-xml-reporting && \
          python${{matrix.python}} -m pip install 'grpcio==1.76.0' 'grpcio-status==1.76.0' 'protobuf==6.33.5' 'googleapis-common-protos==1.71.0' 'zstandard==0.25.0' 'graphviz==0.20.3' && \
          python${{matrix.python}} -m pip cache purge
      - name: List Python packages
        run: python${{matrix.python}} -m pip list
      - name: Download precompiled artifact
        id: download-precompiled
        if: needs.precompile.result == 'success'
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: spark-compile-${{ inputs.os }}-${{ inputs.branch }}-${{ github.run_id }}
      - name: Extract precompiled artifact
        id: extract-precompiled
        if: steps.download-precompiled.outcome == 'success'
        continue-on-error: true
        run: |
          zstd -dc compile-artifact.tar.zst | tar -xf -
          rm compile-artifact.tar.zst
      # Run the tests.
      - name: Run tests
        env: ${{ fromJSON(inputs.envs) }}
        run: |
          if [ "${{ steps.extract-precompiled.outcome }}" = "success" ]; then
            export SKIP_SCALA_BUILD=true
            echo "Reusing precompiled artifact, skipping local SBT build."
          fi
          if [[ "$MODULES_TO_TEST" == *"pyspark-errors"* ]]; then
            export SKIP_PACKAGING=false
            echo "Python Packaging Tests Enabled!"
          fi
          ./dev/run-tests --parallelism 1 --modules "$MODULES_TO_TEST" --python-executables "$PYTHON_TO_TEST"
      - name: Upload test results to report
        env: ${{ fromJSON(inputs.envs) }}
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ inputs.os }}-${{ matrix.modules }}--${{ matrix.java }}-${{ inputs.hadoop }}-hive2.3-${{ env.PYTHON_TO_TEST }}
          path: |
            **/target/test-reports/*.xml
            **/target/surefire-reports/*.xml
      - name: Upload unit tests log files
        env: ${{ fromJSON(inputs.envs) }}
        if: ${{ !success() }}
        uses: actions/upload-artifact@v7
        with:
          name: unit-tests-log-${{ inputs.os }}-${{ matrix.modules }}--${{ matrix.java }}-${{ inputs.hadoop }}-hive2.3-${{ env.PYTHON_TO_TEST }}
          path: "**/target/unit-tests.log"

# Relay workflow: runs on the upstream repo after a fork's workflow completes.
# Downloads pre-extracted annotation commands and replays them so they appear
# as inline annotations on the upstream PR's diff.
#
# This is necessary because annotations from fork workflows (on: push) don't
# appear inline on the upstream PR. This lightweight relay runs in the
# upstream repo's context with checks:write permission, so its annotations
# do appear inline.
#
# To add annotations from a new workflow:
# 1. In the source workflow, grep ::error/::warning lines from the build log.
# 2. Upload them as an artifact matching the pattern "*-annotations".
# 3. Add the source workflow's name to the list below.

name: Report annotations

on:
  workflow_run:
    workflows:
      - "Documentation"
      # Add other workflows here as needed, e.g.:
      # - "Build"
      # - "Linters, licenses, and dependencies"
    types:
      - completed

jobs:
  annotate:
    name: Post annotations
    if: >
      !contains(fromJson('["skipped", "cancelled"]'), github.event.workflow_run.conclusion)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      checks: write
    steps:
      - name: Download annotations
        id: download
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          pattern: "*-annotations"
          merge-multiple: true

      - name: Replay annotations
        if: steps.download.outcome == 'success'
        run: |
          count=0
          for f in *.txt; do
            [ -f "$f" ] || continue
            [ -s "$f" ] || continue
            count=$((count + $(wc -l < "$f")))
            cat "$f"
          done
          echo "Replayed ${count} annotation(s) from workflow: ${{ github.event.workflow_run.name }}"

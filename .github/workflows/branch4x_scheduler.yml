name: "Branch-4.x CI Scheduler"

on:
  schedule:
    - cron: '0 4 */2 * *'
    - cron: '0 7 */2 * *'
    - cron: '0 16 */2 * *'
    - cron: '0 18 */2 * *'
    - cron: '0 19 */2 * *'
    - cron: '0 21 */2 * *'
    - cron: '0 22 */2 * *'
  workflow_dispatch:

jobs:
  schedule:
    if: github.repository == 'apache/spark'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Maven Build
        if: github.event.schedule == '0 16 */2 * *'
        run: |
          gh workflow run build_maven.yml --ref branch-4.x
      - name: Maven Java 21 Build
        if: github.event.schedule == '0 18 */2 * *'
        run: |
          gh workflow run build_maven_java21.yml --ref branch-4.x
      - name: Java 21 Build
        if: github.event.schedule == '0 7 */2 * *'
        run: |
          gh workflow run build_java21.yml --ref branch-4.x
      - name: Java 25 Build
        if: github.event.schedule == '0 22 */2 * *'
        run: |
          gh workflow run build_java25.yml --ref branch-4.x
      - name: Non-ANSI Build
        if: github.event.schedule == '0 4 */2 * *'
        run: |
          gh workflow run build_non_ansi.yml --ref branch-4.x
      - name: Python 3.11 Build
        if: github.event.schedule == '0 19 */2 * *'
        run: |
          gh workflow run build_python_3.11.yml --ref branch-4.x
      - name: Python 3.14 Build
        if: github.event.schedule == '0 21 */2 * *'
        run: |
          gh workflow run build_python_3.14.yml --ref branch-4.x

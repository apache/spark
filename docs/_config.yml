highlighter: rouge
markdown: kramdown
gems:
  - jekyll-redirect-from

# For some reason kramdown seems to behave differently on different
# OS/packages wrt encoding. So we hard code this config.
kramdown:
  entity_output: numeric

plugins:
  - jekyll-redirect-from

include:
  - _static
  - _modules
  - _images
  - _sources

# These allow the documentation to be updated with newer releases
# of Spark, Scala.
SPARK_VERSION: 4.1.0-SNAPSHOT
SPARK_VERSION_SHORT: 4.1.0
SCALA_BINARY_VERSION: "2.13"
SCALA_VERSION: "2.13.18"
SPARK_ISSUE_TRACKER_URL: https://issues.apache.org/jira/browse/SPARK
SPARK_GITHUB_URL: https://github.com/apache/spark
# The DocSearch index is maintained by the Algolia crawler at https://crawler.algolia.com/.
# The crawler indexes only https://spark.apache.org/docs/latest/ and tags every page with
# `version:latest`. All release branches share this single index, so `facetFilters` stays
# pinned to `version:latest` everywhere and no per-release update is required.
DOCSEARCH_SCRIPT: |
  docsearch({
      apiKey: 'd62f962a82bc9abb53471cb7b89da35e',
      appId: 'RAI69RXRSK',
      indexName: 'apache_spark',
      inputSelector: '#docsearch-input',
      enhancedSearchInput: true,
      algoliaOptions: {
        'facetFilters': ["version:latest"]
      },
      debug: false // Set debug to true if you want to inspect the dropdown
  });

permalink: 404.html

exclude: ['README.md']
